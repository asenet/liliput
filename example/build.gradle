plugins {
    id 'java'
    id 'application'
}

group = 'pl.liliput'
version = '1.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

application {
    mainClass = 'pl.asenet.Main'
}

dependencies {
    implementation project(':liliput4j')
}
