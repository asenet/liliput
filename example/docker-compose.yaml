services:

  loki:
    image: grafana/loki:2.9.0
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    tmpfs:
      - /loki
    command: -config.file=/etc/loki/local-config.yaml

  plugin-builder:
    build:
      context: ../liliput-grafana-plugin
      dockerfile: Dockerfile
    volumes:
      - plugin-dist:/plugin

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=liliput-datasource
      - GF_DEFAULT_APP_MODE=development
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - LILIPUT_REGISTRY_PATH=/var/lib/grafana/liliput/templates.json
    volumes:
      - plugin-dist:/var/lib/grafana/plugins/liliput-datasource
      - ./grafana-provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_started
      plugin-builder:
        condition: service_completed_successfully

  demo:
    build:
      context: ..
      dockerfile: example/Dockerfile
    environment:
      REGISTRY_ENDPOINT: http://grafana:3000/api/datasources/uid/liliput/resources
      INDUSTRIES: ${INDUSTRIES:-all}
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "100"
        loki-retries: "5"
        loki-max-backoff: "2s"
    depends_on:
      - loki
      - grafana

volumes:
  plugin-dist:
  grafana-data:
